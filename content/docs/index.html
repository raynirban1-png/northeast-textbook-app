<!DOCTYPE html>
<html>
<head>
  <title>Northeast Textbook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: #1976d2; color: white; padding: 15px; }
    button {
      display: block;
      margin: 10px;
      padding: 12px;
      width: 90%;
      border: none;
      background: #2196f3;
      color: white;
      font-size: 16px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>
  <h2>Northeast Textbook</h2>
</header>

<h3 style="margin-left:10px;">Select State</h3>

<button onclick="openPage('assam')">Assam</button>
<button onclick="openPage('arunachal')">Arunachal</button>
<button onclick="openPage('manipur')">Manipur</button>
<button onclick="openPage('meghalaya')">Meghalaya</button>
<button onclick="openPage('mizoram')">Mizoram</button>
<button onclick="openPage('nagaland')">Nagaland</button>
<button onclick="openPage('sikkim')">Sikkim</button>
<button onclick="openPage('tripura')">Tripura</button>

<script>
function openPage(state) {
  window.location.href = state + ".html";
}
</script>

</body>
</html>
